apply plugin: 'com.android.application'

android {
    namespace "com.aurorastudios.authno"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.aurorastudios.authno"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // versionCode and versionName are injected by GitHub Actions via
        // Gradle properties (-PversionCode and -PversionName).
        // Fallbacks below are used only for local builds.
        versionCode project.hasProperty('versionCode') ? project.property('versionCode').toInteger() : 1
        versionName project.hasProperty('versionName') ? project.property('versionName') : "1.0-local"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            // Keystore is decoded from the KEYSTORE_BASE64 secret by CI before the build.
            // KEYSTORE_PATH env var points to the decoded file; falls back to a local keystore.jks.
            // 3C: the release keystore is NO LONGER committed to the repo — provide it
            // via the KEYSTORE_PATH env var (CI) or a local keystore.jks you keep out of
            // version control (see .gitignore). Rotate the old key if it was ever pushed.
            def ksPath = System.getenv("KEYSTORE_PATH") ?: "keystore.jks"
            def ksFile = file(ksPath)
            if (ksFile.exists()) {
                storeFile     ksFile
                storePassword System.getenv("STORE_PASSWORD") ?: ""
                keyAlias      System.getenv("KEY_ALIAS")      ?: ""
                keyPassword   System.getenv("KEY_PASSWORD")   ?: ""
            }
        }
    }

    buildTypes {
        release {
            // Fall back to debug signing when no release keystore is configured
            // (e.g. a local `assembleRelease` without secrets) so the build still
            // completes instead of failing on a null storeFile.
            signingConfig file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks").exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            // INTENTIONAL: debug builds are signed with the release key and keep
            // the base applicationId (no '.debug' suffix). This is deliberate so
            // the Google Drive / cloud-backup OAuth flow works in the testing
            // environment — Google validates the signing-key SHA-1, which must
            // match the registered release fingerprint. Only applies when a
            // release keystore is actually configured.
            if (file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks").exists()) {
                signingConfig signingConfigs.release
            }
            applicationIdSuffix ""
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')

    // ── Google Sign-In via Credential Manager (replaces deprecated play-services-auth) ──
    // Credential Manager core — handles bottom-sheet UI and credential storage
    implementation "androidx.credentials:credentials:1.3.0"
    // Play Services back-compat layer — required for Android 13 (API 33) and below
    implementation "androidx.credentials:credentials-play-services-auth:1.3.0"
    // Google Identity library — provides GetGoogleIdOption and GoogleIdTokenCredential
    implementation "com.google.android.libraries.identity.googleid:googleid:1.1.1"
    // Google Identity Authorization API — used by GoogleDrivePlugin to request
    // drive.file scope and get an access token without a browser redirect or client secret
    implementation "com.google.android.gms:play-services-auth:21.2.0"

    // ── Custom Tabs (replaces @capacitor/browser for OAuth) ──────────────────
    // Provides CustomTabsIntent, CustomTabsClient, CustomTabsSession
    implementation "androidx.browser:browser:1.8.0"

    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
