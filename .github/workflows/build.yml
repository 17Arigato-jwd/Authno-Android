name: Build AuthNo

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  # release_version exists because this repo's automation credentials can push
  # branches but NOT tags (GitHub App scope). Dispatching with a version cuts a
  # full release from the selected ref: the version is stamped everywhere and
  # the release job has softprops create tag v<version> itself using the
  # Actions token. Leave blank for a normal CI build.
  workflow_dispatch:
    inputs:
      release_version:
        description: "Publish a release as v<value> (e.g. 1.1.16-beta.3). Blank = normal CI build."
        required: false
        type: string

# ── 1. Build React once, reuse across all platform jobs ──────────────────────
jobs:
  build-react:
    name: Build React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      # ── Release version stamp ─────────────────────────────────────────────
      # On v* tags the tag IS the version. Stamping package.json here means
      # prebuild (sync-version.js) regenerates src/version.js from it, so the
      # in-app About screen, ErrorLogger reports and every artifact all carry
      # the tag version — no more "v1.2.0 release containing a 1.1.16 app".
      - name: Stamp tag version
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_version != ''
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -n "$RELEASE_VERSION" ]; then VER="${RELEASE_VERSION#v}"; fi
          npm pkg set version="$VER"
          echo "Stamped package.json version=$VER"
      - name: Reed-Solomon round-trip tests (must pass before any format ships)
        run: npx react-scripts test src/utils/rs.test.js --watchAll=false
        env: { CI: true }
      - run: npm run build
        env: { CI: false }
      - uses: actions/upload-artifact@v4
        with: { name: react-build, path: build/, retention-days: 1 }

  # ── 2. Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: build-react
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: android-actions/setup-android@v3

      - name: "📊 Progress: Environment Ready"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🔨 AuthNo Android Build

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ⏳ Running... |
          | 🔄 Capacitor sync | ⏳ Waiting |
          | 🔑 Keystore decode | ⏳ Waiting |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: "📊 Progress: Dependencies Installed"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Dependencies installed ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ⏳ Running... |
          | 🔑 Keystore decode | ⏳ Waiting |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - uses: actions/download-artifact@v4
        with: { name: react-build, path: build/ }

      - name: Capacitor add + sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: "📊 Progress: Capacitor Synced"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Capacitor synced ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ⏳ Running... |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - run: chmod +x android/gradlew

      # ── Resolve version numbers ───────────────────────────────────────────
      # versionCode = OFFSET + GitHub run number (auto-increments, Play Store
      # safe). The OFFSET exists because run_number RESETS if this workflow
      # file is ever renamed/moved — Play would then reject the "downgrade".
      # If that happens: set VERSION_CODE_OFFSET to the last shipped code.
      # versionName = git tag (e.g. "1.1.6") on releases, "debug-<run>" otherwise
      - name: Set version variables
        id: version
        env:
          VERSION_CODE_OFFSET: 0
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          VERSION_CODE=$(( VERSION_CODE_OFFSET + ${{ github.run_number }} ))
          if [ -n "$RELEASE_VERSION" ]; then
            VERSION_NAME="${RELEASE_VERSION#v}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"   # strip leading 'v'
          else
            VERSION_NAME="debug-${{ github.run_number }}"
          fi
          echo "code=$VERSION_CODE"   >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME"   >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE  versionName=$VERSION_NAME"

      # ── Decode keystore from secret ───────────────────────────────────────
      # The decoded file is written next to build.gradle so Gradle can find it.
      # KEYSTORE_PATH is passed as an env var so signingConfigs.release picks it up.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        shell: bash

      - name: "📊 Progress: Keystore Ready"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Keystore decoded ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ⏳ Running... |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Build release AAB
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_version != ''
        working-directory: android
        env:
          KEYSTORE_PATH: keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: "📊 Progress: Build Complete"
        run: |
          BUILD_TYPE=$([[ "${{ github.ref }}" == refs/tags/* ]] && echo "Release AAB + APK" || echo "Release APK")
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ---
          > **Updated:** Gradle build finished ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ✅ Done |
          | 📤 Upload artifact | ⏳ Running... |

          > 🏷️ **Version:** \`${{ steps.version.outputs.name }}\` (code \`${{ steps.version.outputs.code }}\`)
          > 📦 **Build type:** $BUILD_TYPE

          EOF

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          # Named for what it contains — this is the SIGNED RELEASE APK
          # (was misleadingly called "authno-android-debug").
          name: authno-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_version != ''
        uses: actions/upload-artifact@v4
        with:
          name: authno-android-release
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: "📊 Progress: All Done"
        run: |
          APK_SIZE=$(find android/app/build/outputs/apk/release -name "*.apk" -exec du -sh {} \; 2>/dev/null | cut -f1 || echo "unknown")
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ---

          ## ✅ Build Successful!

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ✅ Done |
          | 📤 Upload artifact | ✅ Done |

          > 🏷️ **Version:** \`${{ steps.version.outputs.name }}\` (code \`${{ steps.version.outputs.code }}\`)
          > 📏 **APK size:** $APK_SIZE
          > 🔗 **Download:** Check the Artifacts section above ↑

          EOF

      - name: "📊 Progress: Build FAILED"
        if: failure()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---

          ## ❌ Build Failed

          Check the step logs above for details.

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ❌ Failed |
          | 📤 Upload artifact | ⏸️ Skipped |

          EOF


  # ── 3. extbk-sandbox Installer ───────────────────────────────────────────────
  # Parallel with Android — both depend on build-react but not on each other.
  # Bundles the sandbox server + compiled React app so users can preview their
  # extension immediately without needing to build the app themselves.
  build-sandbox:
    name: Build extbk-sandbox Installer
    needs: build-react
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - name: Download compiled React app
        uses: actions/download-artifact@v4
        with: { name: react-build, path: extensions/extbk-sandbox/app/ }

      - name: Install sandbox dependencies
        working-directory: extensions/extbk-sandbox
        run: npm install --omit=dev

      - name: Verify bundled app is present
        run: |
          if [ ! -f "extensions/extbk-sandbox/app/index.html" ]; then
            echo "Bundled React app missing from extbk-sandbox/app/" >&2
            exit 1
          fi
          echo "Bundled app: $(find extensions/extbk-sandbox/app -type f | wc -l) files"

      - name: Set version
        id: version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -n "$RELEASE_VERSION" ]; then
            echo "name=v${RELEASE_VERSION#v}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=dev-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Package Linux/macOS installer (tar.gz)
        run: |
          PKG="extbk-sandbox-${{ steps.version.outputs.name }}"
          mkdir -p dist/$PKG
          cp -r extensions/extbk-sandbox/src       dist/$PKG/src
          cp -r extensions/extbk-sandbox/app       dist/$PKG/app
          cp -r extensions/extbk-sandbox/installer dist/$PKG/installer
          cp    extensions/extbk-sandbox/package.json dist/$PKG/package.json
          chmod +x dist/$PKG/installer/install.sh
          tar -czf dist/${PKG}-linux-mac.tar.gz -C dist $PKG
          echo "Package size: $(du -sh dist/${PKG}-linux-mac.tar.gz | cut -f1)"

      - name: Package Windows installer (zip)
        run: |
          PKG="extbk-sandbox-${{ steps.version.outputs.name }}"
          cd dist && zip -r ${PKG}-windows.zip $PKG
          echo "Package size: $(du -sh ${PKG}-windows.zip | cut -f1)"

      - name: Upload sandbox installers
        uses: actions/upload-artifact@v4
        with:
          name: extbk-sandbox-installer
          path: |
            dist/extbk-sandbox-*-linux-mac.tar.gz
            dist/extbk-sandbox-*-windows.zip
          if-no-files-found: error

      - name: Summary
        run: |
          PKG="extbk-sandbox-${{ steps.version.outputs.name }}"
          SIZE=$(du -sh dist/${PKG}-linux-mac.tar.gz | cut -f1)
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ## extbk-sandbox Installer

          | Item | Value |
          |------|-------|
          | Version | \`${{ steps.version.outputs.name }}\` |
          | Bundled React app | Included |
          | Linux/macOS | \`${PKG}-linux-mac.tar.gz\` ($SIZE) |
          | Windows | \`${PKG}-windows.zip\` |

          **Linux/macOS:** \`tar -xzf ${PKG}-linux-mac.tar.gz && cd ${PKG} && ./installer/install.sh\`
          **Windows:** \`powershell -ExecutionPolicy Bypass -File installer\\install.ps1\`
          EOF

      - name: Sandbox build FAILED
        if: failure()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## extbk-sandbox Installer Failed
          Check the step logs above. Common cause: React build artifact not found.
          EOF

  # ── 3b. Desktop (Electron) — Windows + Linux (D1) ────────────────────────────
  # These jobs restore the desktop build to CI. Previously only Android was
  # built here, which is exactly why `npm run dist:win` / `dist:linux` had
  # silently rotted. Both reuse the shared React artifact.
  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: build-react
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - uses: actions/download-artifact@v4
        with: { name: react-build, path: build/ }
      # electron-builder reads version from THIS checkout's package.json —
      # stamp the tag version so installer filenames/metadata match the release.
      - name: Stamp tag version
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_version != ''
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -n "$RELEASE_VERSION" ]; then VER="${RELEASE_VERSION#v}"; fi
          npm pkg set version="$VER"
      # dist:win runs electron-builder with --publish never: without it,
      # electron-builder's default policy is onTagOrDraft — on tag builds it
      # tried to self-publish, found the (deliberately) empty GH_TOKEN, and
      # FAILED the job, which skipped the release job and shipped nothing.
      - name: Build Windows installer
        run: npm run dist:win
        env: { CI: false, GH_TOKEN: "" }
      - uses: actions/upload-artifact@v4
        with:
          name: authno-desktop-windows
          path: |
            dist-electron/*.exe
            dist-electron/*.msi
          if-no-files-found: warn

  build-desktop-linux:
    name: Build Desktop (Linux)
    needs: build-react
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci --no-audit --no-fund --legacy-peer-deps
      - uses: actions/download-artifact@v4
        with: { name: react-build, path: build/ }
      - name: Stamp tag version
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_version != ''
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -n "$RELEASE_VERSION" ]; then VER="${RELEASE_VERSION#v}"; fi
          npm pkg set version="$VER"
      - name: Build Linux packages
        run: npm run dist:linux
        env: { CI: false, GH_TOKEN: "" }
      - uses: actions/upload-artifact@v4
        with:
          name: authno-desktop-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.tar.gz
          if-no-files-found: warn

  # ── 4. GitHub Release
  release:
    name: Publish Release
    needs: [build-android, build-sandbox, build-desktop-windows, build-desktop-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_version != ''
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: release-assets/ }
      # On dispatch releases the tag doesn't exist yet — softprops creates it
      # at the commit this run built (github.sha) using the Actions token.
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.release_version) }}
          name: "AuthNo ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.release_version) }}"
          files: |
            release-assets/**/*.apk
            release-assets/**/*.aab
            release-assets/**/*.tar.gz
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
