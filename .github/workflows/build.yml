name: Build AuthNo

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# ── 1. Build React once, reuse across all platform jobs ──────────────────────
jobs:
  build-react:
    name: Build React
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npm run build
        env: { CI: false }
      - uses: actions/upload-artifact@v4
        with: { name: react-build, path: build/, retention-days: 1 }

  # ── 2. Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: build-react
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: android-actions/setup-android@v3

      - name: "📊 Progress: Environment Ready"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🔨 AuthNo Android Build

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ⏳ Running... |
          | 🔄 Capacitor sync | ⏳ Waiting |
          | 🔑 Keystore decode | ⏳ Waiting |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - run: npm install

      - name: "📊 Progress: Dependencies Installed"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Dependencies installed ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ⏳ Running... |
          | 🔑 Keystore decode | ⏳ Waiting |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - uses: actions/download-artifact@v4
        with: { name: react-build, path: build/ }

      - name: Capacitor add + sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: "📊 Progress: Capacitor Synced"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Capacitor synced ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ⏳ Running... |
          | 🏗️ Gradle build | ⏳ Waiting |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - run: chmod +x android/gradlew

      # ── Resolve version numbers ───────────────────────────────────────────
      # versionCode = GitHub run number (auto-increments, Play Store safe)
      # versionName = git tag (e.g. "1.1.6") on releases, "debug-<run>" otherwise
      - name: Set version variables
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
            VERSION_NAME="${VERSION_NAME#v}"   # strip leading 'v'
          else
            VERSION_NAME="debug-${{ github.run_number }}"
          fi
          echo "code=$VERSION_CODE"   >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME"   >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE  versionName=$VERSION_NAME"

      # ── Decode keystore from secret ───────────────────────────────────────
      # The decoded file is written next to build.gradle so Gradle can find it.
      # KEYSTORE_PATH is passed as an env var so signingConfigs.release picks it up.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        shell: bash

      - name: "📊 Progress: Keystore Ready"
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---
          > **Updated:** Keystore decoded ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ⏳ Running... |
          | 📤 Upload artifact | ⏳ Waiting |

          EOF

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Build release AAB
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        env:
          KEYSTORE_PATH: keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: "📊 Progress: Build Complete"
        run: |
          BUILD_TYPE=$([[ "${{ github.ref }}" == refs/tags/* ]] && echo "Release AAB + APK" || echo "Release APK")
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ---
          > **Updated:** Gradle build finished ✅

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ✅ Done |
          | 📤 Upload artifact | ⏳ Running... |

          > 🏷️ **Version:** \`${{ steps.version.outputs.name }}\` (code \`${{ steps.version.outputs.code }}\`)
          > 📦 **Build type:** $BUILD_TYPE

          EOF

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: authno-android-debug
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload release AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: authno-android-release
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: "📊 Progress: All Done"
        run: |
          APK_SIZE=$(find android/app/build/outputs/apk/release -name "*.apk" -exec du -sh {} \; 2>/dev/null | cut -f1 || echo "unknown")
          cat >> $GITHUB_STEP_SUMMARY << EOF

          ---

          ## ✅ Build Successful!

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ✅ Done |
          | 📤 Upload artifact | ✅ Done |

          > 🏷️ **Version:** \`${{ steps.version.outputs.name }}\` (code \`${{ steps.version.outputs.code }}\`)
          > 📏 **APK size:** $APK_SIZE
          > 🔗 **Download:** Check the Artifacts section above ↑

          EOF

      - name: "📊 Progress: Build FAILED"
        if: failure()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'

          ---

          ## ❌ Build Failed

          Check the step logs above for details.

          | Step | Status |
          |------|--------|
          | ⚙️ Environment setup | ✅ Done |
          | 📦 Dependencies | ✅ Done |
          | 🔄 Capacitor sync | ✅ Done |
          | 🔑 Keystore decode | ✅ Done |
          | 🏗️ Gradle build | ❌ Failed |
          | 📤 Upload artifact | ⏸️ Skipped |

          EOF

  # ── 3. GitHub Release (tag pushes only) ─────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: release-assets/ }
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.apk
            release-assets/**/*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
