<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/authno.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="AuthNo — offline story editor by Aurora Studios" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/authno-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>AuthNo</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      Boot splash — fully inline (no external requests), so it paints with the
      renderer's very first frame and never staggers in like the old splash
      window did (blank box -> white -> gradient -> late logo). App.js fades it
      out once React has mounted. Used by desktop, Android and web alike.
    -->
    <div id="boot-splash" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#060606;transition:opacity .25s ease;pointer-events:none;">
      <div style="text-align:center;animation:authno-boot-pulse 1.6s ease-in-out infinite;">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#5a00d9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 14px;">
          <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
          <line x1="16" y1="8" x2="2" y2="22"/>
          <line x1="17.5" y1="15" x2="9" y2="15"/>
        </svg>
        <div id="boot-splash-word" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.85);">AUTHNO</div>
      </div>
      <style>@keyframes authno-boot-pulse{0%,100%{opacity:1}50%{opacity:.55}}</style>
    </div>
    <script>
      // Match the splash to the saved theme so light-theme users don't get a
      // dark flash. Unknown/installed themes default to dark.
      try {
        var t = localStorage.getItem('authno_theme_id');
        if (t === 'light-default' || t === 'paper' || t === 'sepia') {
          document.getElementById('boot-splash').style.background = (t === 'sepia') ? '#f4ecd8' : '#f0f0f2';
          document.getElementById('boot-splash-word').style.color = 'rgba(26,26,30,.85)';
        }
      } catch (e) {}
    </script>
  </body>
</html>
